# Smoke test compose: v1.0.7 validator <-> v1.1.0 publisher back-compat.
#
# The publisher service is built from the repo's root Dockerfile and is the
# unit under test — every assertion in tests/smoke/test_v107_v110_back_compat.py
# pokes at its HTTP surface to prove the v1.0.7 fleet still parses our
# response shape on v1.1.0 deploy day.
#
# The validator-v1-0-7 service exists so the smoke test composition pulls
# the actual v1.0.7 image from ghcr (proves it's still there, captures the
# deploy-time dependency in code). The container itself idles — there is no
# published "validator-v1.0.7" runnable image in the cathedral-runtime
# registry (the image is the eval/probe runtime, not the validator binary).
# The v1.0.7 validator's pull-loop behavior is exercised at test time by
# loading v1.0.7's src/cathedral/validator/pull_loop.py via `git show v1.0.7`
# and running it against the publisher under test — same code path the
# in-production v1.0.7 fleet runs, just driven from pytest.

services:
  publisher-v1-1-0:
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      # The validator pull loop verifies cathedral_signature with the public
      # half of this seed. conftest.py generates an ephemeral 32-byte ed25519
      # private key per test session and passes it through docker-compose env.
      CATHEDRAL_EVAL_SIGNING_KEY: "${CATHEDRAL_EVAL_SIGNING_KEY}"
      # Gate Tier A off so the publisher does not require Polaris config.
      CATHEDRAL_ENABLE_POLARIS_DEPLOY: "false"
      # Stub the eval orchestrator so the background loop does nothing it
      # can fail on. We are testing the read surface, not eval execution.
      CATHEDRAL_EVAL_MODE: "stub"
      # Bind the publisher's sqlite to the bind-mounted data dir so the
      # test process can write seed rows directly (see conftest.seed_eval_run).
      CATHEDRAL_DB_PATH: /data/publisher.db
      PORT: "8000"
      PYTHONUNBUFFERED: "1"
    ports:
      - "18000:8000"
    volumes:
      - "${SMOKE_DATA_DIR}:/data"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\""]
      interval: 2s
      timeout: 5s
      retries: 60
      start_period: 5s

  # Documentary placeholder — see comment at top of file. Pulling this image
  # asserts the v1.0.7 tag still exists on ghcr.io/cathedralai/cathedral-runtime;
  # the smoke test fails fast at compose-up if a registry cleanup ever removed
  # it from under the v1.0.7 fleet.
  validator-v1-0-7:
    image: ghcr.io/cathedralai/cathedral-runtime:v1.0.7
    command: ["sleep", "infinity"]
    depends_on:
      publisher-v1-1-0:
        condition: service_healthy
    restart: "no"
