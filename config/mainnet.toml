[network]
name = "finney"
netuid = 39
validator_hotkey = "REPLACE_ME"

[polaris]
base_url = "https://api.polaris.computer/"
public_key_hex = "REPLACE_WITH_POLARIS_ED25519_PUBLIC_KEY_HEX"
fetch_timeout_secs = 30

[http]
listen = "0.0.0.0:9333"
bearer_token_env = "CATHEDRAL_BEARER"

[weights]
# SN39 weights_rate_limit is 100 blocks × 12s = 1200s exactly. Firing at
# 1200s means every other set_weights races the rate-limit window and
# half land as blocked_by_transaction_error. 1500s (125 blocks) gives a
# clean 25-block buffer so every call succeeds.
interval_secs = 1500
disabled = false

[storage]
database_url = "sqlite://data/validator-mainnet.db"
