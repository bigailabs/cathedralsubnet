[network]
name = "finney"
netuid = 39
validator_hotkey = "REPLACE_ME"
wallet_name = "cathedral-validator"

[polaris]
base_url = "https://api.polaris.computer/"
public_key_hex = "REPLACE_WITH_POLARIS_ED25519_PUBLIC_KEY_HEX"
fetch_timeout_secs = 30

[http]
listen_host = "0.0.0.0"
listen_port = 9333
bearer_token_env = "CATHEDRAL_BEARER"

[weights]
# SN39 weights_rate_limit is 100 blocks * 12s = 1200s exactly. Firing at
# 1200s means every other set_weights races the rate-limit window and
# half land as blocked_by_transaction_error. 1500s (125 blocks) gives a
# clean 25-block buffer so every call succeeds.
interval_secs = 1500
disabled = false
# SN39 mainnet: uid 204 is the subnet owner. Burn target for the protective
# emission share until v3 bug_isolation lands. The v1 EU AI Act challenge is
# too easy to discriminate miner quality at scale, so route 95% of weight to
# the subnet owner and reserve 5% for measured miner signal. Revert toward 0
# once v3 is producing real per-miner separation on mainnet.
burn_uid = 204
forced_burn_percentage = 95.0
# Off until the bug_isolation_v1 feed is intentionally enabled.
v3_bug_isolation_weight = 0.0

[publisher]
url = "https://api.cathedral.computer"
public_key_env = "CATHEDRAL_PUBLIC_KEY_HEX"
pull_interval_secs = 30.0
api_token_env = "CATHEDRAL_PUBLISHER_TOKEN"

[storage]
database_path = "data/validator-mainnet.db"

[worker]
poll_interval_secs = 5.0
max_concurrent_verifications = 4

[stall]
after_secs = 600
