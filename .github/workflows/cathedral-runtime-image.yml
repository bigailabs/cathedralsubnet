name: Build and push Cathedral runtime image

# Mirrors Polaris's hermes-image.yml. Triggers only on docker/cathedral-runtime/*
# changes (or manual dispatch), so landing scaffold PRs without a version
# bump does NOT publish a new image tag. To cut a release, bump
# docker/cathedral-runtime/CATHEDRAL_RUNTIME_VERSION.

on:
  push:
    branches: [main]
    paths:
      - docker/cathedral-runtime/Dockerfile
      - docker/cathedral-runtime/CATHEDRAL_RUNTIME_VERSION
      - docker/cathedral-runtime/requirements.txt
      - docker/cathedral-runtime/server.py
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "value=$(cat docker/cathedral-runtime/CATHEDRAL_RUNTIME_VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: docker/cathedral-runtime
          file: docker/cathedral-runtime/Dockerfile
          push: true
          build-args: CATHEDRAL_RUNTIME_VERSION=${{ steps.version.outputs.value }}
          tags: |
            ghcr.io/bigailabs/cathedral-runtime:${{ steps.version.outputs.value }}
            ghcr.io/bigailabs/cathedral-runtime:latest
          labels: |
            org.opencontainers.image.title=cathedral-runtime
            org.opencontainers.image.version=${{ steps.version.outputs.value }}
            org.opencontainers.image.source=https://github.com/bigailabs/cathedralsubnet
