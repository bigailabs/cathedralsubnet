name: Snyk
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
  security-events: write
jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Snyk to check for vulnerabilities (Python deps)
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --sarif-file-output=snyk-python.sarif
      - name: Run Snyk on Docker image
        uses: snyk/actions/docker@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ghcr.io/cathedralai/cathedral-runtime:latest
          args: --file=docker/cathedral-runtime/Dockerfile --sarif-file-output=snyk-docker.sarif
      - name: Upload SARIF (python)
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk-python.sarif
          category: snyk-python
      - name: Upload SARIF (docker)
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk-docker.sarif
          category: snyk-docker
